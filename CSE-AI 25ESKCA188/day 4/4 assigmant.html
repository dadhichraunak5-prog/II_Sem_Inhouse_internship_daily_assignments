<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap The Fruit</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
    text-align:center;
}

h1{
    margin-top:20px;
    color:green;
}

#timer{
    color:red;
    font-size:32px;
    font-weight:bold;
}

#gameArea{
    width:900px;
    height:500px;
    margin:30px auto;
    border:4px solid #333;
    background:white;
    position:relative;
    overflow:hidden;
    border-radius:15px;
}

.fruitBox{
    position:absolute;
    width:180px;
    text-align:center;
    transition:0.3s;
}

.fruitBox img{
    width:150px;
    height:150px;
    border-radius:15px;
    border:3px solid black;
    cursor:pointer;
}

.count{
    font-size:22px;
    font-weight:bold;
    margin-top:5px;
}
</style>
</head>

<body>

<h1> Tap The Fruit </h1>

<h2>Timer : <span id="timer">05:00</span></h2>

<div id="gameArea">

<div class="fruitBox" id="appleBox">
<img src="https://media.istockphoto.com/id/1439436349/photo/red-apple-isolated-on-white-background-clipping-path-full-depth-of-field.jpg?s=612x612&w=0&k=20&c=Zi8kdlLPWQSd7IN_KcrlLRU9MpdQo7YKyGQpH90iQmg=" onclick="tap('apple')">
<h3>Apple</h3>
<div class="count">Count : <span id="appleCount">0</span></div>
</div>

<div class="fruitBox" id="bananaBox">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl6cR9qHmdvVkUzmHoO1IBfT1h8OjkHUFcU5O1JkAWVw&s=10" onclick="tap('banana')">
<h3>Banana</h3>
<div class="count">Count : <span id="bananaCount">0</span></div>
</div>

</div>

<script>

let appleTap=0;
let bananaTap=0;
let gameOver=false;
let time=300;

const gameArea=document.getElementById("gameArea");
const apple=document.getElementById("appleBox");
const banana=document.getElementById("bananaBox");

function randomPosition(element){

    let maxX=gameArea.clientWidth-element.offsetWidth;
    let maxY=gameArea.clientHeight-element.offsetHeight;

    let x=Math.floor(Math.random()*maxX);
    let y=Math.floor(Math.random()*maxY);

    element.style.left=x+"px";
    element.style.top=y+"px";
}

function moveFruits(){

    randomPosition(apple);
    randomPosition(banana);

}

window.onload=function(){
    moveFruits();
};

function tap(fruit){

    if(gameOver) return;

    if(fruit==="apple"){
        appleTap++;
        document.getElementById("appleCount").innerHTML=appleTap;
    }
    else{
        bananaTap++;
        document.getElementById("bananaCount").innerHTML=bananaTap;
    }

    moveFruits();

}

let timer=setInterval(function(){

    let m=Math.floor(time/60);
    let s=time%60;

    document.getElementById("timer").innerHTML=
    String(m).padStart(2,"0")+":"+
    String(s).padStart(2,"0");

    time--;

    if(time<0){

        clearInterval(timer);
        gameOver=true;

        let winner="Draw";

        if(appleTap>bananaTap)
            winner="Apple";

        if(bananaTap>appleTap)
            winner="Banana";

        alert(
`⏰ Time Over!

🍎 Apple : ${appleTap}

🍌 Banana : ${bananaTap}

🏆 Winner : ${winner}`
);

    }

},1000);

</script>

</body>
</html>
